name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVG stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: FengLingYu7563
        run: node scripts/update-github-stats.mjs

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg assets/discord-bot-demo-card.svg assets/wynnmaze-card.svg
          if git diff --cached --quiet; then
            echo "No stats changes to commit."
          else
            git commit -m "Update generated GitHub stats"
            git push
          fi
